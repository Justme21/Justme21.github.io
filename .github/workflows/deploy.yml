name: Deploy website to GitHub Pages

on:
  # Run every time you push to main
  push:
    branches: ['main']
  # Also allows you to trigger a build manually from the GitHub Actions tab
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; don't cancel an in-progress run
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:

  # ── Step 1: Build the site ─────────────────────────────────────────────────
  # Hugo is a static site generator. It reads the content/ and config/ folders
  # and produces a plain HTML/CSS/JS website in the public/ folder.
  # We need Go (for Hugo's module system), Hugo itself, and Node/pnpm
  # (for Tailwind CSS, which handles all the styling).
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full git history is needed so Hugo can show page last-modified dates
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Hugo uses Go's module system to download the HugoBlox theme
          go-version: '1.21'

      - name: Install Hugo (extended edition)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.150.1'
          # "Extended" edition is required — it includes the CSS processor
          # needed to compile Tailwind styles
          extended: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Node dependencies
        # Downloads Tailwind and other JS packages listed in package.json
        run: pnpm install

      - name: Build site with Hugo
        # --gc    removes unused cache files after the build
        # --minify compresses HTML/CSS/JS for faster page loads
        run: hugo --gc --minify
        env:
          HUGO_ENABLEGITINFO: 'true'

      - name: Build search index
        # Pagefind scans the built HTML and creates the search index
        # that powers the search bar in the navbar
        run: pnpm dlx pagefind --source 'public'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload built site as Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './public'

  # ── Step 2: Publish to GitHub Pages ───────────────────────────────────────
  # This step takes the artifact uploaded above and makes it live.
  # It only runs after the build job succeeds.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
